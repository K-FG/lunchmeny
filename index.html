<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dagens Lunch</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #fff5f0 0%, #ffe4e1 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: white; border-radius: 20px; padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin-bottom: 30px; text-align: center;
        }
        h1 { font-size: 2.5em; color: #333; margin-bottom: 10px; }
        .date { color: #666; font-size: 1.1em; }
        .update-info { margin-top: 10px; color: #888; font-size: 0.85em; }

        .area-selector {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .area-selector select {
            padding: 10px 20px;
            font-size: 1.1em;
            border: 2px solid #ff6b35;
            border-radius: 10px;
            background: white;
            color: #333;
            cursor: pointer;
            outline: none;
        }
        .area-selector select:focus {
            border-color: #e85a2a;
            box-shadow: 0 0 0 3px rgba(255,107,53,0.2);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }
        .restaurant-card {
            background: white; border-radius: 20px; padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .restaurant-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
        }
        .restaurant-header {
            display: flex; justify-content: space-between; align-items: start;
            margin-bottom: 20px; padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        .restaurant-name { font-size: 1.8em; color: #333; font-weight: 700; }
        .restaurant-location { color: #888; font-size: 0.9em; margin-top: 5px; }
        .restaurant-price { color: #ff6b35; font-size: 0.95em; margin-top: 5px; font-weight: 600; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 0.85em; font-weight: 600; }
        .status-success { background: #d4edda; color: #155724; }
        .status-error { background: #f8d7da; color: #721c24; }
        .menu-section { margin-top: 20px; }
        .menu-title {
            font-size: 0.85em; text-transform: uppercase; color: #888;
            font-weight: 600; letter-spacing: 1px; margin-bottom: 15px;
        }
        .menu-items { line-height: 1.8; color: #555; }
        .menu-item { padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
        .menu-item:last-child { border-bottom: none; }
        .menu-item.veg { color: #2d8a4e; font-weight: 600; }
        .error-message {
            background: #fff3cd; border: 1px solid #ffc107;
            border-radius: 10px; padding: 20px; margin: 20px 0; color: #856404;
        }
        .loading { text-align: center; padding: 60px; color: #666; font-size: 1.2em; }
        .spinner {
            border: 4px solid #f3f3f3; border-top: 4px solid #ff6b35;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .info-box {
            background: #e7f3ff; border: 1px solid #b3d9ff;
            border-radius: 15px; padding: 25px; margin-top: 30px;
        }
        .info-box h3 { color: #0056b3; margin-bottom: 15px; font-size: 1.1em; }
        .info-box ul { list-style: none; color: #004085; }
        .info-box li { padding: 5px 0; padding-left: 20px; position: relative; }
        .info-box li:before { content: "•"; position: absolute; left: 0; font-size: 1.5em; line-height: 0.8; }
        @media (max-width: 768px) {
            .header { padding: 25px; }
            h1 { font-size: 2em; }
            .menu-grid { grid-template-columns: 1fr; }
            .restaurant-card { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 id="pageTitle">Dagens Lunch</h1>
        <div class="date" id="currentDate"></div>
        <div class="update-info" id="updateInfo"></div>
        <div class="area-selector">
            <select id="areaSelect" onchange="onAreaChange()">
                <option value="tyreso">Tyresö</option>
                <option value="marievik">Marievik</option>
            </select>
        </div>
    </div>

    <div id="content">
        <div class="loading">
            <div class="spinner"></div>
            <p>Hämtar dagens menyer...</p>
        </div>
    </div>

    <div class="info-box">
        <h3>Information</h3>
        <ul>
            <li>Menyerna uppdateras automatiskt varje dag kl 07:00 via GitHub Actions</li>
            <li>Sidan fungerar för alla utan inloggning</li>
            <li>Data skrapas från restaurangernas egna webbplatser</li>
            <li>Inkluderar salladsbuffé, hembakat bröd, kaffe/te och efterrätt</li>
        </ul>
    </div>
</div>

<script>
const AREAS = {
    tyreso: {
        name: 'Tyresö',
        file: 'menus-tyreso.json'
    },
    marievik: {
        name: 'Marievik',
        file: 'menus-marievik.json'
    }
};

function formatDate() {
    return new Date().toLocaleDateString('sv-SE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

function onAreaChange() {
    const area = document.getElementById('areaSelect').value;
    document.getElementById('pageTitle').textContent = 'Dagens Lunch - ' + AREAS[area].name;
    loadMenus(area);
}

async function loadMenus(area) {
    area = area || document.getElementById('areaSelect').value;
    const file = AREAS[area].file;

    document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div><p>Hämtar dagens menyer...</p></div>';

    try {
        const response = await fetch(file + '?t=' + Date.now());
        if (response.ok) {
            const data = await response.json();
            displayMenus(data.menus);
            document.getElementById('updateInfo').textContent = 'Senast uppdaterad: ' + new Date(data.lastUpdate).toLocaleString('sv-SE');
        } else {
            document.getElementById('content').innerHTML = '<div class="error-message"><strong>Fel:</strong> Menyerna uppdateras automatiskt kl 07:00 via GitHub Actions.</div>';
        }
    } catch (error) {
        document.getElementById('content').innerHTML = '<div class="error-message"><strong>Fel:</strong> Kunde inte ladda menyer.</div>';
    }
}

function displayMenus(menus) {
    const html = '<div class="menu-grid">' + menus.map(menu => {
        const priceLine = menu.price ? '<div class="restaurant-price">' + menu.price + '</div>' : '';
        return '<div class="restaurant-card">' +
            '<div class="restaurant-header">' +
                '<div>' +
                    '<div class="restaurant-name">' + menu.restaurant + '</div>' +
                    '<div class="restaurant-location">' + menu.location + '</div>' +
                    priceLine +
                '</div>' +
                '<span class="status-badge ' + (menu.status === 'success' ? 'status-success' : 'status-error') + '">' +
                    (menu.status === 'success' ? 'Uppdaterad' : 'Fel') +
                '</span>' +
            '</div>' +
            '<div class="menu-section">' +
                '<div class="menu-title">Dagens rätter</div>' +
                '<div class="menu-items">' +
                    menu.menu.split('\n').map(item => {
                        const t = item.trim();
                        if (!t) return '';
                        const isVeg = t.toLowerCase().startsWith('veg:');
                        return '<div class="menu-item' + (isVeg ? ' veg' : '') + '">' + t + '</div>';
                    }).join('') +
                '</div>' +
            '</div>' +
            (menu.error ? '<div style="margin-top:15px;padding:10px;background:#fff3cd;border-radius:8px;font-size:0.9em;color:#856404;">' + menu.error + '</div>' : '') +
        '</div>';
    }).join('') + '</div>';
    document.getElementById('content').innerHTML = html;
}

// Init
document.getElementById('currentDate').textContent = formatDate();
document.getElementById('pageTitle').textContent = 'Dagens Lunch - Tyresö';
loadMenus('tyreso');
</script>
</body>
</html>
